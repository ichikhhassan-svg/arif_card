<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Card</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #18181c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Container for the card */
    .card-container {
      width: 450px;
      height: 600px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      overflow: hidden;
    }

    /* Front Cover Image */
    .cover-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <img src="cover.png" alt="Front Cover" class="cover-image">
  </div>

</body>
</html>
